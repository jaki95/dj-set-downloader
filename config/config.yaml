log_level: -4
audio_processor: ffmpeg
audio_source: soundcloud
tracklist_source: trackids
file_extension: m4a

storage:
  # Storage type: "local" or "gcs"
  type: gcs
  
  # Local storage options (used when type is "local")
  data_dir: data      
  output_dir: data 
  
  # GCS storage options (used when type is "gcs")
  bucket_name: dj-set-files
  object_prefix: dj-set/